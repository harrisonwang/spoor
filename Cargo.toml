[package]
name = "gist"
version = "0.1.0"
edition = "2024"
description = "Convert files and URLs to LLM-friendly markdown"
license = "MIT"

[[bin]]
name = "gist"
path = "src/main.rs"

[dependencies]
# CLI + errors
clap = { version = "4.5", features = ["derive"] }
anyhow = "1"

# Encoding detection
encoding_rs = "0.8"
chardetng = "0.1"

# Container + XML
zip = { version = "2.2", default-features = false, features = ["deflate"] }
quick-xml = "0.36"

# Format-specific
calamine = "0.26"
pdf-extract = "0.7"
csv = "1.3"
serde_json = "1"
scraper = "0.20"

# HTTP
ureq = { version = "2.10", features = ["tls"] }
url = "2"

[dev-dependencies]
# Snapshot testing — run `cargo insta review` to accept changes.
insta = { version = "1.40", features = ["yaml"] }

[lib]
name = "gist"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
