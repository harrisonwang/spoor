<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>spoor / local file search</title>
    <link rel="stylesheet" href="../../wasm/demo/styles.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <span class="index">SP—08 / LOCAL</span>
        <h1>问你的<br /><em>本地文件。</em></h1>
        <p>这是一个无后端检索 demo。文件解析与关键词匹配全在浏览器完成。</p>
      </header>
      <section id="dropzone" class="dropzone">
        <div class="target">＋</div>
        <div><strong>先选择一个文档</strong><span>内容不会离开此标签页</span></div>
        <input id="picker" type="file" />
      </section>
      <section class="status-line"><span id="status">NO DOCUMENT</span><span id="stats">LOCAL ONLY</span></section>
      <form id="query"><input id="question" placeholder="输入关键词，例如：风险" disabled /><button disabled>查找相关段落</button></form>
      <pre id="output">解析后可按关键词检索最相关的段落。</pre>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
