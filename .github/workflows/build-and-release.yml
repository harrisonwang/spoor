name: build-and-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            exe_ext: ".exe"
          - runner: macos-latest
            target: x86_64-apple-darwin
            exe_ext: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            exe_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg="gist_${VERSION}_${{ matrix.target }}"
          rm -rf package out
          mkdir -p package/gist out
          cp "target/${{ matrix.target }}/release/gist${{ matrix.exe_ext }}" "package/gist/gist${{ matrix.exe_ext }}"
          cp README.md "package/gist/" || true
          tar -C package -czf "out/${pkg}.tar.gz" gist

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "gist_${env:VERSION}_${{ matrix.target }}"
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force out -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package\gist | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\gist${{ matrix.exe_ext }}" "package\gist\gist${{ matrix.exe_ext }}"
          Copy-Item "README.md" "package\gist\README.md"
          Compress-Archive -Path "package\gist" -DestinationPath "out\$pkg.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gist_${{ matrix.target }}
          path: |
            out/*.tar.gz
            out/*.zip

  release:
    if: github.ref_type == 'tag'
    name: release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          files=( *.zip *.tar.gz )
          if ((${#files[@]} == 0)); then
            echo "no artifacts found"
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  notify-homebrew-tap:
    if: github.ref_type == 'tag'
    name: notify homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Dispatch to homebrew-tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg tool "gist" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            '{event_type:"tool-released", client_payload:{tool:$tool, tag:$tag, repo:$repo}}')"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/harrisonwang/homebrew-tap/dispatches" \
            -d "$payload"
