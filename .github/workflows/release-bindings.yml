name: release bindings

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: full ci
    needs: release-config
    uses: ./.github/workflows/ci.yml

  release-config:
    name: validate release configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release version
        if: github.ref_type == 'tag'
        run: python3 scripts/check-release-version.py "${{ github.ref_name }}"

  python-wheels:
    name: python wheel (${{ matrix.target }})
    needs: [ci, release-config]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path bindings/python/Cargo.toml
          manylinux: auto
          target: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: pyspoor-${{ matrix.target }}
          path: dist/*

  publish-python:
    name: publish pyspoor
    needs: python-wheels
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pyspoor-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  node-build:
    name: node binding (${{ matrix.target }})
    needs: [ci, release-config]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: bindings/node
        run: |
          npm ci
          npm run build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: bindings/node/*.node

  publish-node:
    name: publish @harrisonwang/spoor
    needs: node-build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install
        working-directory: bindings/node
        run: npm ci
      - name: Create platform packages
        working-directory: bindings/node
        run: npm run create-npm-dirs
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: bindings/node/artifacts
          merge-multiple: true
      - name: Stage artifacts
        working-directory: bindings/node
        run: npm run artifacts
      - name: Prepare packages
        working-directory: bindings/node
        run: npx napi prepublish -t npm --skip-optional-publish --no-gh-release
      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in bindings/node/npm/*; do
            name="$(node -p "require('./$pkg/package.json').name")"
            version="$(node -p "require('./$pkg/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already exists; skipping"
            else
              (cd "$pkg" && npm publish --access public --provenance)
            fi
          done
      - name: Publish main package
        shell: bash
        run: |
          set -euo pipefail
          pkg="bindings/node"
          name="$(node -p "require('./$pkg/package.json').name")"
          version="$(node -p "require('./$pkg/package.json').version")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already exists; skipping"
          else
            (cd "$pkg" && npm publish --ignore-scripts --access public --provenance)
          fi

  publish-wasm:
    name: publish @harrisonwang/spoor-wasm
    needs: [ci, release-config]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build
        working-directory: crates/spoor-wasm
        run: npm run build
      - name: Verify package payload
        working-directory: crates/spoor-wasm/pkg
        run: |
          test -s spoor_wasm_bg.wasm
          npm pack --dry-run
      - name: Publish
        working-directory: crates/spoor-wasm/pkg
        shell: bash
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already exists; skipping"
          else
            npm publish --access public --provenance
          fi

  publish-crates:
    name: publish Rust crates
    needs: [ci, release-config]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish spoor-core
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "spoor-core") | .version')"
          if cargo info "spoor-core@$version" >/dev/null 2>&1; then
            echo "spoor-core@$version already exists; skipping"
          else
            cargo publish --locked -p spoor-core
          fi
      - name: Wait for sparse index propagation
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "spoor-core") | .version')"
          for attempt in {1..20}; do
            if cargo info "spoor-core@$version" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 15
          done
          echo "spoor-core@$version did not appear in crates.io index" >&2
          exit 1
      - name: Publish spoor-cli
        shell: bash
        env:
          OIDC_TOKEN: ${{ steps.auth.outputs.token }}
          BOOTSTRAP_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "spoor-cli") | .version')"
          if cargo info "spoor-cli@$version" >/dev/null 2>&1; then
            echo "spoor-cli@$version already exists; skipping"
          else
            token="$OIDC_TOKEN"
            if ! cargo info spoor-cli >/dev/null 2>&1; then
              if [[ -z "$BOOTSTRAP_TOKEN" ]]; then
                echo "spoor-cli requires CRATES_IO_TOKEN for its initial publish" >&2
                exit 1
              fi
              token="$BOOTSTRAP_TOKEN"
            fi
            CARGO_REGISTRY_TOKEN="$token" cargo publish --locked -p spoor-cli
          fi
