name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            exe_ext: ".exe"
          - runner: macos-latest
            target: x86_64-apple-darwin
            exe_ext: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            exe_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package and verify (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pkg="pith_${VERSION}_${{ matrix.target }}"
          rm -rf package out verify
          mkdir -p package/pith out verify
          cp "target/${{ matrix.target }}/release/pith${{ matrix.exe_ext }}" "package/pith/pith${{ matrix.exe_ext }}"
          cp README.md "package/pith/"
          tar -C package -czf "out/${pkg}.tar.gz" pith
          tar -xzf "out/${pkg}.tar.gz" -C verify
          test -x "verify/pith/pith${{ matrix.exe_ext }}"
          "verify/pith/pith${{ matrix.exe_ext }}" --version

      - name: Package and verify (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "pith_${env:VERSION}_${{ matrix.target }}"
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force out -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force verify -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package\pith | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\pith${{ matrix.exe_ext }}" "package\pith\pith${{ matrix.exe_ext }}"
          Copy-Item "README.md" "package\pith\README.md"
          Compress-Archive -Path "package\pith" -DestinationPath "out\$pkg.zip" -Force
          Expand-Archive -Path "out\$pkg.zip" -DestinationPath verify -Force
          & "verify\pith\pith${{ matrix.exe_ext }}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pith_${{ matrix.target }}
          path: |
            out/*.tar.gz
            out/*.zip

  publish:
    if: github.ref_type == 'tag'
    name: publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          files=( *.zip *.tar.gz )
          if ((${#files[@]} == 0)); then
            echo "no artifacts found" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  notify-homebrew-tap:
    if: github.ref_type == 'tag'
    name: notify homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Dispatch to homebrew-tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg tool "pith" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            '{event_type:"tool-released", client_payload:{tool:$tool, tag:$tag, repo:$repo}}')"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/harrisonwang/homebrew-tap/dispatches" \
            -d "$payload"

  publish-npm:
    if: github.ref_type == 'tag'
    name: publish npm
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage binaries and set versions
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"

          extract() {
            local archive="$1" dest="$2" exe="$3"
            mkdir -p "$dest"
            if [[ "$archive" == *.zip ]]; then
              unzip -p "$archive" "pith/$exe" > "$dest/$exe"
            else
              tar -xzf "$archive" -O "pith/$exe" > "$dest/$exe"
            fi
            chmod +x "$dest/$exe"
          }
          extract "artifacts/pith_${TAG}_aarch64-apple-darwin.tar.gz"     npm/pith-darwin-arm64/bin pith
          extract "artifacts/pith_${TAG}_x86_64-apple-darwin.tar.gz"      npm/pith-darwin-x64/bin   pith
          extract "artifacts/pith_${TAG}_x86_64-unknown-linux-gnu.tar.gz" npm/pith-linux-x64/bin    pith
          extract "artifacts/pith_${TAG}_x86_64-pc-windows-msvc.zip"      npm/pith-win32-x64/bin    pith.exe

          for pkg in npm/pith npm/pith-*; do
            (cd "$pkg" && npm version "$version" --no-git-tag-version --allow-same-version)
          done

          node -e "
            const fs = require('fs');
            const p = 'npm/pith/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            for (const k of Object.keys(j.optionalDependencies || {})) {
              j.optionalDependencies[k] = '$version';
            }
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "

      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in npm/pith-*; do
            (cd "$pkg" && npm publish --access public --provenance)
          done

      - name: Publish main package
        shell: bash
        run: |
          set -euo pipefail
          cd npm/pith && npm publish --access public --provenance

  notify-scoop-bucket:
    if: github.ref_type == 'tag'
    name: notify scoop bucket
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Dispatch to scoop-bucket
        env:
          TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN" ]]; then
            echo "SCOOP_BUCKET_TOKEN is not configured" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg tool "pith" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            '{event_type:"tool-released", client_payload:{tool:$tool, tag:$tag, repo:$repo}}')"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/harrisonwang/scoop-bucket/dispatches" \
            -d "$payload"
