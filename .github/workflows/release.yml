name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: full ci
    needs: release-config
    uses: ./.github/workflows/ci.yml

  release-config:
    name: validate release configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release version
        if: github.ref_type == 'tag'
        run: python3 scripts/check-release-version.py "${{ github.ref_name }}"

      - name: Validate required secrets
        if: github.ref_type == 'tag'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for name in HOMEBREW_TAP_TOKEN SCOOP_BUCKET_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is not configured" >&2
              exit 1
            fi
          done

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [ci, release-config]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_ext: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            exe_ext: ".exe"
          - runner: macos-latest
            target: x86_64-apple-darwin
            exe_ext: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            exe_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package and verify (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          pkg="spoor_${VERSION}_${{ matrix.target }}"
          rm -rf package out verify
          mkdir -p package/spoor out verify
          cp "target/${{ matrix.target }}/release/spoor${{ matrix.exe_ext }}" "package/spoor/spoor${{ matrix.exe_ext }}"
          cp README.md "package/spoor/"
          tar -C package -czf "out/${pkg}.tar.gz" spoor
          tar -xzf "out/${pkg}.tar.gz" -C verify
          test -x "verify/spoor/spoor${{ matrix.exe_ext }}"
          "verify/spoor/spoor${{ matrix.exe_ext }}" --version

      - name: Package and verify (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "spoor_${env:VERSION}_${{ matrix.target }}"
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force out -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force verify -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package\spoor | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\spoor${{ matrix.exe_ext }}" "package\spoor\spoor${{ matrix.exe_ext }}"
          Copy-Item "README.md" "package\spoor\README.md"
          Compress-Archive -Path "package\spoor" -DestinationPath "out\$pkg.zip" -Force
          Expand-Archive -Path "out\$pkg.zip" -DestinationPath verify -Force
          & "verify\spoor\spoor${{ matrix.exe_ext }}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoor_${{ matrix.target }}
          path: |
            out/*.tar.gz
            out/*.zip

  publish:
    if: github.ref_type == 'tag'
    name: publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          files=( *.zip *.tar.gz )
          if ((${#files[@]} == 0)); then
            echo "no artifacts found" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  notify-homebrew-tap:
    if: github.ref_type == 'tag'
    name: notify homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Dispatch to homebrew-tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg tool "spoor" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            '{event_type:"tool-released", client_payload:{tool:$tool, tag:$tag, repo:$repo}}')"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/harrisonwang/homebrew-tap/dispatches" \
            -d "$payload"

  publish-npm:
    if: github.ref_type == 'tag'
    name: publish npm
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage binaries and set versions
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"

          extract() {
            local archive="$1" dest="$2" exe="$3"
            mkdir -p "$dest"
            if [[ "$archive" == *.zip ]]; then
              unzip -p "$archive" "spoor/$exe" > "$dest/$exe"
            else
              tar -xzf "$archive" -O "spoor/$exe" > "$dest/$exe"
            fi
            chmod +x "$dest/$exe"
          }
          extract "artifacts/spoor_${TAG}_aarch64-apple-darwin.tar.gz"     npm/spoor-cli-darwin-arm64/bin spoor
          extract "artifacts/spoor_${TAG}_x86_64-apple-darwin.tar.gz"      npm/spoor-cli-darwin-x64/bin   spoor
          extract "artifacts/spoor_${TAG}_x86_64-unknown-linux-gnu.tar.gz" npm/spoor-cli-linux-x64/bin    spoor
          extract "artifacts/spoor_${TAG}_x86_64-pc-windows-msvc.zip"      npm/spoor-cli-win32-x64/bin    spoor.exe

          for pkg in npm/spoor-cli npm/spoor-cli-*; do
            (cd "$pkg" && npm version "$version" --no-git-tag-version --allow-same-version)
          done

          node -e "
            const fs = require('fs');
            const p = 'npm/spoor-cli/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            for (const k of Object.keys(j.optionalDependencies || {})) {
              j.optionalDependencies[k] = '$version';
            }
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "

      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in npm/spoor-cli-*; do
            name="$(node -p "require('./$pkg/package.json').name")"
            version="$(node -p "require('./$pkg/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already exists; skipping"
            else
              (cd "$pkg" && npm publish --access public --provenance)
            fi
          done

      - name: Publish main package
        shell: bash
        run: |
          set -euo pipefail
          pkg="npm/spoor-cli"
          name="$(node -p "require('./$pkg/package.json').name")"
          version="$(node -p "require('./$pkg/package.json').version")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already exists; skipping"
          else
            (cd "$pkg" && npm publish --access public --provenance)
          fi

  notify-scoop-bucket:
    if: github.ref_type == 'tag'
    name: notify scoop bucket
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Dispatch to scoop-bucket
        env:
          TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN" ]]; then
            echo "SCOOP_BUCKET_TOKEN is not configured" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg tool "spoor" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            '{event_type:"tool-released", client_payload:{tool:$tool, tag:$tag, repo:$repo}}')"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/harrisonwang/scoop-bucket/dispatches" \
            -d "$payload"
