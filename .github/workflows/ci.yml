name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-targets

      - name: Minimal core features
        run: cargo check --locked -p spoor-core --no-default-features

  wasm:
    name: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Core formats
        run: cargo check --locked -p spoor-wasm --target wasm32-unknown-unknown --no-default-features --features core-formats
      - name: Full formats
        run: cargo check --locked -p spoor-wasm --target wasm32-unknown-unknown --no-default-features --features full
      - name: Build publishable and browser packages
        working-directory: crates/spoor-wasm
        run: |
          npm run build
          npm run build:web
      - name: Verify publishable WASM package
        working-directory: crates/spoor-wasm/pkg
        run: |
          test -s spoor_wasm_bg.wasm
          npm pack --dry-run
      - name: Browser package smoke test
        run: node wasm/demo/smoke.mjs
      - name: Cloudflare Worker dry run
        working-directory: wasm/cloudflare-worker
        run: |
          npm install
          npm exec wrangler deploy -- --dry-run

  bindings:
    name: native bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Python binding
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install maturin pytest
          cd bindings/python
          VIRTUAL_ENV="$GITHUB_WORKSPACE/.venv" "$GITHUB_WORKSPACE/.venv/bin/maturin" develop
          "$GITHUB_WORKSPACE/.venv/bin/pytest"
      - name: Node binding
        run: |
          cd bindings/node
          npm install
          npm run build
          npm test

  examples:
    name: runnable examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Tauri core integration
        run: cargo run --locked -p spoor-tauri-core-example
      - name: Lambda binary-layer integration
        run: |
          cargo build --locked -p spoor-cli
          cd examples/serverless-lambda
          SPOOR_BIN="$GITHUB_WORKSPACE/target/debug/spoor" npm test
